<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="initial-scale=1.0">

<style>
html, body, #map {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100vh;
}

#infoBox {
    position: absolute;
    top: 10px;
    left: 10px;
    background: white;
    padding: 10px;
    font-family: Arial;
    border-radius: 6px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    z-index: 1000;
}
</style>

<script src="https://sdk.mappls.com/map/sdk/web?v=3.0&access_token=cxnpqzxawukwpajjqvwfatzjavgzrcxoxsqp&callback=initMap"></script>

</head>

<body>

<div id="map"></div>

<div id="infoBox">
Speed: 0 km/h<br>
Distance Today: 0 km<br>
Last Update: --
</div>

<script>

var map;
var marker;
var path = [];
var polyline;

var prevLat = null;
var prevLon = null;
var prevTime = null;

var dailyDistance = 0;
var currentDay = new Date().getDate();

function initMap() {

    map = new mappls.Map("map", {
        center: [28.61, 77.23],
        zoom: 15
    });

    marker = new mappls.Marker({
        map: map,
        position: {lat: 28.61, lng: 77.23}
    });

    polyline = new mappls.Polyline({
        map: map,
        path: path,
        strokeColor: "#8B4513",
        strokeWeight: 4
    });

    loadHistory().then(() => {

        console.log("History Loaded");

        setInterval(updateLocation, 15000);

    }).catch(error => {

        console.error("History Load Error:", error);
        setInterval(updateLocation, 15000);

    });
}


/* LIVE LOCATION */

function updateLocation() {

    fetch("https://api.thingspeak.com/channels/3290360/feeds/last.json?api_key=5MSDTN7LSUQHD3AN")

    .then(r => r.json())

    .then(data => {

        var lat = parseFloat(data.field1);
        var lon = parseFloat(data.field2);
        var speed = parseFloat(data.field3);

        if (isNaN(speed)) speed = 0;

        if (isNaN(lat) || isNaN(lon)) {
            console.warn("Invalid GPS data");
            return;
        }

        var now = new Date();

        /* reset distance at midnight */

        if (now.getDate() != currentDay) {
            dailyDistance = 0;
            currentDay = now.getDate();
        }

        marker.setPosition({lat: lat, lng: lon});

        map.panTo({lat: lat, lng: lon});

        var moveDist = 0;

        if (prevLat != null) {
            moveDist = distance(prevLat, prevLon, lat, lon);
        }

        /* ignore GPS noise under 10 meters */

        if (prevLat == null || moveDist > 10) {

            path.push({lat: lat, lng: lon});

            /* limit path size */

            if (path.length > 500) {
                path.shift();
            }

            polyline.setPath(path);

            if (prevLat != null) {
                dailyDistance += moveDist;
            }

        }

        prevLat = lat;
        prevLon = lon;
        prevTime = now;

        document.getElementById("infoBox").innerHTML =
            "Speed: " + speed.toFixed(1) + " km/h<br>" +
            "Distance Today: " + (dailyDistance / 1000).toFixed(2) + " km<br>" +
            "Last Update: " + now.toLocaleTimeString();

    })

    .catch(error => {
        console.error("Fetch error:", error);
    });

}


/* LOAD HISTORY */

function loadHistory() {

    return fetch("https://api.thingspeak.com/channels/3290360/feeds.json?api_key=5MSDTN7LSUQHD3AN&results=200")

    .then(r => r.json())

    .then(data => {

        if (!data.feeds) return;

        data.feeds.forEach(point => {

            var lat = parseFloat(point.field1);
            var lon = parseFloat(point.field2);

            if (!isNaN(lat) && !isNaN(lon)) {

                path.push({lat: lat, lng: lon});

            }

        });

        polyline.setPath(path);

        if (path.length > 0) {

            var last = path[path.length - 1];

            marker.setPosition(last);
            map.setCenter(last);

            prevLat = last.lat;
            prevLon = last.lng;
            prevTime = new Date();

        }

    });

}


/* DISTANCE CALCULATION */

function distance(lat1, lon1, lat2, lon2) {

    var R = 6371000;

    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;

    var a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;

}

</script>

</body>
</html>
